name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below to help us reproduce and fix it.

  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      description: Which version of redfish-python-sdk are you using?
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Which Python version are you running?
      placeholder: "e.g. 3.11.4"
    validations:
      required: true

  - type: input
    id: bmc-vendor
    attributes:
      label: BMC Vendor / Firmware
      description: Which BMC vendor and firmware version are you connecting to (if applicable)?
      placeholder: "e.g. Huawei iBMC 6.22, HPE iLO 5 v2.78, Dell iDRAC 9"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create a RedfishClient with ...
        2. Call client.get_xxx()
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, tracebacks, or unexpected output.
    validations:
      required: true

  - type: textarea
    id: code-sample
    attributes:
      label: Minimal Reproducible Example
      description: If possible, provide a minimal code snippet that reproduces the issue.
      render: python
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots that might help.
    validations:
      required: false
